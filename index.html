<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budget Tracker</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
    --bg: #e0e0e0;
    --card: #f5f5f5;
    --text-main: #333333;
    --text-sub: #666666;
    --primary: #888888;
    --danger: #c0392b;
    --border: #cccccc;
}
body { 
    font-family: 'Inter', -apple-system, sans-serif; 
    background: var(--bg);
    color: var(--text-main);
    margin: 0;
    display: flex;
    justify-content: center;
    padding: 50px 20px;
}
.container { 
    background: var(--card); 
    padding: 30px; 
    border-radius: 16px; 
    width: 100%;
    max-width: 380px; 
    box-shadow: 0 10px 25px rgba(0,0,0,0.05);
}
h2 { 
    font-size: 0.85rem; 
    text-transform: uppercase; 
    letter-spacing: 1px; 
    color: var(--text-sub); 
    margin: 0 0 10px 0; 
}
.total-box {
    font-size: 2.4rem;
    font-weight: 800;
    margin-bottom: 30px;
    color: var(--text-main);
}
.input-section { margin-bottom: 25px; }
input { 
    width: 100%; 
    box-sizing: border-box;
    margin-bottom: 12px; 
    padding: 14px; 
    border: 1px solid var(--border); 
    border-radius: 10px;
    font-size: 1rem;
    background: #f0f0f0;
    outline: none;
    transition: border 0.2s;
}
input:focus { border-color: var(--primary); background: #fff; }
.button-row {
    display: flex;
    gap: 10px;
    margin-bottom: 30px;
}
button { 
    padding: 14px; 
    border: none;
    border-radius: 10px;
    cursor: pointer; 
    font-weight: 700;
    font-size: 0.9rem;
    transition: transform 0.1s, opacity 0.2s;
}
.btn-add { background: var(--primary); color: white; flex: 2; }
.btn-clear { background: #d6d6d6; color: var(--text-sub); flex: 1; font-size: 0.75rem; }
button:active { transform: scale(0.98); }
button:hover { opacity: 0.9; }
ul { list-style: none; padding: 0; margin: 0; border-top: 1px solid var(--border); }
li { 
    padding: 15px 5px; 
    border-bottom: 1px solid #e0e0e0; 
    display: flex; 
    justify-content: space-between; 
    align-items: center;
}
.item-label { display: flex; align-items: center; gap: 10px; font-weight: 500; }
.dot { color: var(--primary); font-size: 0.6rem; }
.amt-label { font-weight: 700; color: var(--text-main); }
.delete-btn { 
    color: #999999; 
    cursor: pointer; 
    margin-left: 12px;
    font-size: 1rem;
}
.delete-btn:hover { color: var(--danger); }
</style>
</head>
<body>

<div class="container">
    <h2>Available Balance</h2>
    <div class="total-box">P<span id="t">0.00</span></div>
    
    <div class="input-section">
        <input type="text" id="k" placeholder="Item Name">
        <input type="number" id="v" placeholder="Amount">
    </div>

    <div class="button-row">
        <button class="btn-add" onclick="addItem()">+ ADD ITEM</button>
        <button class="btn-clear" onclick="resetAll()">RESET</button>
    </div>

    <ul id="l"></ul>
</div>

<script>
const SB_URL = "https://tsrqbjqtmvfwmlkcbmnv.supabase.co"; 
const SB_KEY = "sb_publishable_K1_ccu4JHHehoO18J5vxOg_9JnHbhW3"; 
const sb = supabase.createClient(SB_URL, SB_KEY);

const totalEl = document.getElementById('t'), 
      listEl = document.getElementById('l'), 
      nameInp = document.getElementById('k'), 
      amtInp = document.getElementById('v');

async function showData() {
    let { data, error } = await sb.from('budgetDB').select('*');
    if (error) return console.log(error);

    listEl.innerHTML = "";
    let total = 0;
    data.forEach(item => {
        total += item.amount;
        let li = document.createElement('li');
        li.innerHTML = `
            <span class="item-label"><i class="fas fa-circle dot"></i> ${item.item}</span>
            <span>
                <span class="amt-label">P${item.amount.toFixed(2)}</span>
                <i class="fas fa-times-circle delete-btn" onclick="deleteItem(${item.id})"></i>
            </span>
        `;
        listEl.appendChild(li);
    });
    totalEl.innerText = total.toLocaleString(undefined, {minimumFractionDigits: 2});
}

async function addItem() {
    const name = nameInp.value;
    const amount = parseFloat(amtInp.value);
    if (name && amount > 0) {
        const { error } = await sb.from('budgetDB').insert([{ item: name, amount: amount }]);
        if (!error) {
            nameInp.value = ''; amtInp.value = '';
            showData();
        }
    }
}

async function deleteItem(id) {
    await sb.from('budgetDB').delete().eq('id', id);
    showData();
}

async function resetAll() {
    if(confirm("Delete all history?")) {
        await sb.from('budgetDB').delete().neq('id', 0);
        showData();
    }
}

showData();
</script>

</body>
</html>
